# Rime schema: 惠陽客家話 (Hagfa Pinyim)
# https://github.com/Hydramus/rime-hakka
# SPDX-License-Identifier: CC-BY-SA-4.0 (dictionary) / MIT (schema scaffolding)

schema:
  schema_id: hakka_huiyang
  name: 惠陽客家話
  version: "0.1.1"
  author:
    - rime-hakka contributors
  description: |
    Hakka input method for the Huiyang (惠陽) dialect, using the
    Hagfa Pinyim (客家拼音) romanization. Tone digits 1–6 are optional:
    typing `ngitteu` and `ngit5teu2` both yield 日頭.
  dependencies: []

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 英文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    reset: 0
    states: [ 漢字, 汉字 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  # Tone digits 1–6 are part of the alphabet so they're accepted as input,
  # but the `derive` rule below ALSO indexes every dictionary entry with its
  # toneless form. Result: toneless input is the default UX; digits are
  # accepted for disambiguation.
  alphabet: "zyxwvutsrqponmlkjihgfedcba123456"
  delimiter: " '"
  algebra:
    - derive/([1-6])//                     # toneless fallback (primary UX)
    - abbrev/^([a-z]).+$/$1/               # initial-only abbreviation (e.g. "nt" → ngit teu)
    - abbrev/^([a-z][a-z]).+$/$1/          # 2-letter prefix abbreviation

translator:
  dictionary: hakka_huiyang
  prism: hakka_huiyang
  spelling_hints: 8
  # Disable auto-sentence composition — there is no Hakka language model, so
  # sentence mode produces random ordering. Word-by-word is correct here.
  enable_sentence: false
  # Learn from the user's candidate selections, like MS IME does.
  enable_user_dict: true
  user_dict: hakka_huiyang
  db_class: tabledb
  preedit_format:
    # Cosmetic disambiguation in the preedit line only; does not affect matching.
    - "xform/([aeiou])v/$1ü/"

simplifier:
  option_name: simplification
  opencc_config: t2s.json

punctuator:
  import_preset: default

menu:
  page_size: 15

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
