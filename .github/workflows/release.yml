name: release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Release zip (cross-platform schema package) ───────────────────────────
  release-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r build/requirements.txt

      - name: Fetch upstream sources
        run: python build/fetch_sources.py

      - name: Build Huiyang dictionary
        run: python build/build_dict.py huiyang

      - name: Validate Huiyang schema
        run: python build/validate_schema.py schemas/huiyang

      - name: Package release zip
        run: python build/package.py huiyang --version "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true

  # ── Windows .exe (Weasel / Inno Setup) ───────────────────────────────────
  release-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r build/requirements.txt

      - name: Fetch upstream sources
        run: python build/fetch_sources.py

      - name: Build Huiyang dictionary
        run: python build/build_dict.py huiyang

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\iscc.exe'
          & $iscc "/DAppVersion=$version" 'installers\windows\rime-hakka.iss'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe

  # ── macOS .pkg (Squirrel / pkgbuild) ─────────────────────────────────────
  release-macos-pkg:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r build/requirements.txt

      - name: Fetch upstream sources
        run: python build/fetch_sources.py

      - name: Build Huiyang dictionary
        run: python build/build_dict.py huiyang

      - name: Build macOS package
        run: bash installers/macos/build-pkg.sh "${GITHUB_REF_NAME#v}"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.pkg
            dist/*.pkg.sha256
