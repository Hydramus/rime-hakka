name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r build/requirements.txt

      - name: Fetch upstream sources
        run: python build/fetch_sources.py

      - name: Build Huiyang dictionary
        run: python build/build_dict.py huiyang

      - name: Validate Huiyang schema
        run: python build/validate_schema.py schemas/huiyang

      - name: Package release zip
        run: python build/package.py huiyang --version "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
