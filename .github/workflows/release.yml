name: release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Release zip (cross-platform schema package) ───────────────────────────
  release-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r build/requirements.txt

      - name: Fetch upstream sources
        run: python build/fetch_sources.py

      - name: Build Huiyang dictionary
        run: python build/build_dict.py huiyang

      - name: Validate Huiyang schema
        run: python build/validate_schema.py schemas/huiyang

      - name: Package release zip
        run: python build/package.py huiyang --version "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true

  # ── Windows .exe (Weasel / Inno Setup) ───────────────────────────────────
  release-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r build/requirements.txt

      - name: Fetch upstream sources
        run: python build/fetch_sources.py

      - name: Build Huiyang dictionary
        run: python build/build_dict.py huiyang

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\iscc.exe'
          & $iscc "/DAppVersion=$version" 'installers\windows\rime-hakka.iss'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe

  # ── macOS .pkg (Squirrel / pkgbuild) ─────────────────────────────────────
  release-macos-pkg:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r build/requirements.txt

      - name: Fetch upstream sources
        run: python build/fetch_sources.py

      - name: Build Huiyang dictionary
        run: python build/build_dict.py huiyang

      - name: Build macOS package
        run: bash installers/macos/build-pkg.sh "${GITHUB_REF_NAME#v}"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.pkg
            dist/*.pkg.sha256

  # ── Update Homebrew tap ───────────────────────────────────────────────────
  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: release-macos-pkg
    steps:
      - name: Check out tap repo
        uses: actions/checkout@v4
        with:
          repository: Hydramus/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Get .pkg SHA256 and version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA=$(curl -sL "https://github.com/Hydramus/rime-hakka/releases/download/${GITHUB_REF_NAME}/hakka-huiyang-rime-v${VERSION}.pkg.sha256" | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Cask formula
        run: |
          sed -i "s/version \".*\"/version \"${{ steps.meta.outputs.version }}\"/" Casks/rime-hakka-huiyang.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ steps.meta.outputs.sha256 }}\"/" Casks/rime-hakka-huiyang.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/rime-hakka-huiyang.rb
          git diff --staged --quiet || git commit -m "chore: update rime-hakka-huiyang to v${{ steps.meta.outputs.version }}"
          git push
