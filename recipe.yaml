# plum recipe for rime-hakka
# https://github.com/rime/plum
#
# This makes the following work on any plum-enabled Rime install:
#   bash rime-install <user>/rime-hakka
#
# plum will copy schemas/**/*.schema.yaml and schemas/**/*.dict.yaml into
# the user's Rime data directory, then ask the deployer to rebuild.

# Required package metadata for recipe validation.
package:
  name: rime-hakka
  version: "1.0.0"

# Schemas to install when users pull this recipe.
extra:
  schemas:
    - schema: hakka_huiyang
